name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: --severity=warning --external-sources --shell=bash
        with:
          scandir: '.'
          additional_files: 'check.sh generate-sso-profiles.sh cleanup-generated-profiles.sh'
          ignore_paths: '.aws-sso-cache .git'
          # zsh 補完は shellcheck の対象外 (zsh は非サポートで bash 解析すると誤検知)
          ignore_names: 'generate-sso-profiles.zsh'
