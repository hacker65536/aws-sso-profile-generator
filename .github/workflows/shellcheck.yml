name: shellcheck

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        env:
          SHELLCHECK_OPTS: --severity=warning --external-sources --shell=bash
        with:
          scandir: '.'
          additional_files: 'check.sh generate-sso-profiles.sh cleanup-generated-profiles.sh'
          ignore_paths: '.aws-sso-cache .git'
          # zsh 補完は shellcheck の対象外 (zsh は非サポートで bash 解析すると誤検知)
          ignore_names: 'generate-sso-profiles.zsh'
